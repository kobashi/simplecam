<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>Camera Frame Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="preview-shell" aria-label="camera preview">
        <div class="preview-stage">
          <video
            id="camera"
            class="camera-feed"
            autoplay
            muted
            playsinline
            webkit-playsinline="true"
          ></video>
          <canvas
            id="filteredPreview"
            class="filtered-preview is-hidden"
            aria-hidden="true"
          ></canvas>
          <div class="preview-vignette" aria-hidden="true"></div>
          <div id="gestureSurface" class="gesture-surface" aria-hidden="true"></div>
        </div>
        <div class="trail-controls" aria-label="filter controls">
          <label class="trail-slider">
            <span class="trail-slider-label">CONTRAST</span>
            <input
              id="contrastThresholdSlider"
              class="trail-slider-input"
              type="range"
              min="0"
              max="255"
              step="1"
              value="0"
            />
            <span id="contrastThresholdValue" class="trail-slider-value">0</span>
          </label>
          <label class="trail-slider">
            <span class="trail-slider-label">DELAY</span>
            <input
              id="trailDelaySlider"
              class="trail-slider-input"
              type="range"
              min="0"
              max="2000"
              step="10"
              value="100"
            />
            <span id="trailDelayValue" class="trail-slider-value">100</span>
          </label>
          <label class="trail-slider">
            <span class="trail-slider-label">TRAIL</span>
            <input
              id="trailAmountSlider"
              class="trail-slider-input"
              type="range"
              min="0"
              max="2000"
              step="10"
              value="500"
            />
            <span id="trailAmountValue" class="trail-slider-value">500</span>
          </label>
        </div>
        <button
          id="fullscreenToggle"
          class="fullscreen-toggle"
          type="button"
          aria-label="Toggle fullscreen"
        >
          FULL
        </button>
        <div class="status-panel is-hidden" id="statusPanel" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="./app.js?v=delay-contrast-fix"></script>
  </body>
</html>
